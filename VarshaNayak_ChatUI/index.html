<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app d-flex">
  <aside class="sidebar">
    <button class="new-chat">+ New Chat</button>
    <div class="chat-history"></div>
  </aside>

  <main class="chat-container d-flex flex-column">

    <section class="welcome">
      <h1>Welcome</h1>
      <div class="suggestions">
        <div class="card">Explain AI</div>
        <div class="card">Write code</div>
        <div class="card">Help me study</div>
        <div class="card">Project ideas</div>
      </div>
    </section>

    <section class="messages flex-grow-1"></section>

    <div class="typing d-none">
      <span></span><span></span><span></span>
    </div>

    <div class="input-area d-flex">
      <textarea placeholder="Type a message..."></textarea>
      <button class="send-btn"><i class="fa fa-paper-plane"></i></button>
    </div>

  </main>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/chat.js"></script>

</body>
</html>
